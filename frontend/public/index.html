<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Gap Tracker - Generate Roadmap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="text-slate-800 min-h-screen flex items-center justify-center p-4">

    <!-- Container Utama -->
    <div class="glass max-w-2xl w-full shadow-2xl rounded-2xl overflow-hidden border border-slate-100 fade-in">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 p-8 text-center">
            <h1 class="text-3xl font-bold text-white mb-2">Skill Gap Tracker</h1>
            <p class="text-blue-100">Temukan gap skill kamu dan raih karir impian dengan AI Roadmap</p>
        </div>

        <!-- Form Section -->
        <div class="p-8" id="formSection">
            <h2 class="text-xl font-semibold mb-6">Profil Karir Kamu</h2>

            <!-- Status Karir -->
            <div class="mb-5">
                <label class="block text-sm font-medium text-slate-700 mb-2">Status Saat Ini</label>
                <div class="flex gap-4">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="status" value="belum" class="peer sr-only" checked
                            onchange="toggleCurrentPosition(false)">
                        <div
                            class="p-3 text-center border rounded-lg peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-slate-50 transition">
                            <i class="fas fa-graduation-cap mb-1"></i><br>Belum Berkarir
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="status" value="sudah" class="peer sr-only"
                            onchange="toggleCurrentPosition(true)">
                        <div
                            class="p-3 text-center border rounded-lg peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 hover:bg-slate-50 transition">
                            <i class="fas fa-briefcase mb-1"></i><br>Sudah Berkarir
                        </div>
                    </label>
                </div>
            </div>

            <!-- Posisi Saat Ini (Hidden by default) -->
            <div class="mb-5 hidden" id="currentPositionDiv">
                <label class="block text-sm font-medium text-slate-700 mb-2">Posisi Saat Ini (Tulis bebas)</label>
                <input type="text" id="currentPosition" placeholder="Contoh: IT Support di Perusahaan Ritel"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
            </div>

            <!-- Target Karir -->
            <div class="mb-8">
                <label class="block text-sm font-medium text-slate-700 mb-2">Target Karir Impian (Dari Database)</label>
                <select id="targetCareer"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-white">
                    <option value="" disabled selected>Loading roles...</option>
                </select>
            </div>

            <button onclick="generate()" id="generateBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                <i class="fas fa-magic"></i> Generate AI Roadmap
            </button>
        </div>

        <!-- Result Section (Loading) -->
        <div id="loadingSection" class="hidden p-12 text-center text-slate-500">
            <i class="fas fa-circle-notch spinner text-4xl text-blue-500 mb-4"></i>
            <h3 class="text-lg font-semibold text-slate-700">Menganalisis Job Requirements...</h3>
            <p class="text-sm">Gemini sedang meracik roadmap berdasarkan data pasar kerja (RAG).</p>
        </div>

        <!-- Result Section (Roadmap) -->
        <div id="resultSection" class="hidden p-8 bg-slate-50 border-t">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Misi Belajar Kamu</h2>
                <button onclick="reset()" class="text-sm text-blue-600 hover:underline">Buat Ulang</button>
            </div>

            <!-- Summary Card -->
            <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-5 mb-6 shadow-sm">
                <div class="flex items-start gap-3">
                    <i class="fas fa-info-circle text-indigo-500 mt-1 text-xl"></i>
                    <div>
                        <p id="rmSummary" class="text-sm text-indigo-900 font-medium"></p>
                        <hr class="border-indigo-200 my-2">
                        <div class="flex items-center gap-2 text-xs text-indigo-700">
                            <i class="fas fa-clock"></i> <span id="rmDuration"></span>
                            <span class="mx-2">•</span>
                            <i class="fas fa-chart-line"></i> <span id="rmInsight"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Timeline Phases -->
            <div class="relative border-l-2 border-blue-200 ml-3" id="rmPhases">
                <!-- Phases will be injected here -->
            </div>

            <div class="mt-8 text-center">
                <p class="text-xs text-slate-400">Powered by Gemini AI + Supabase pgvector RAG</p>
            </div>
        </div>
    </div>

    <!-- Script Utama -->
    <script src="app.js"></script>
</body>

</html>
